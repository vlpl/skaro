name: express-patterns
description: "Express.js architecture and middleware patterns"
version: "1.0"
phases:
  - implement
  - plan
roles:
  - coder

instructions: |
  ## Express Patterns
  - Architecture: Controller → Service → Repository
  - No business logic in controllers — delegate to services
  - DTOs (interfaces/classes) for request/response typing
  - Async error handling: express-async-errors or asyncHandler wrapper
  - Centralized error middleware as last app.use() handler
  - Input validation middleware: Zod schemas or class-validator before handler
  - Structured logging: pino or winston, never console.log in production
  - Use Router() for grouping related endpoints
  - Middleware order: cors → helmet → rate-limit → auth → routes → error
  - Environment config: dotenv + typed config object, validated at startup
  - Use async/await exclusively — no callback-style code

phase_instructions:
  plan: |
    When planning Express endpoints:
    - List all routes with HTTP method, path, middleware chain
    - Define DTOs for request body, query params, response
    - Plan middleware: auth, validation, rate limiting per route group
    - Identify shared services and their dependency graph
