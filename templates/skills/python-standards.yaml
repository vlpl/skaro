name: python-standards
description: "Python coding standards and idioms"
version: "1.0"
phases:
  - implement
  - plan
  - fix
roles:
  - coder

instructions: |
  ## Python Standards
  - Type hints on all function signatures (params + return)
  - Use `from __future__ import annotations` for modern type syntax
  - Prefer dataclasses or Pydantic models over plain dicts for structured data
  - Use pathlib.Path over os.path
  - Use f-strings over .format() or %
  - Context managers (with) for resource management
  - Avoid mutable default arguments (use None + factory pattern)
  - Prefer list/dict/set comprehensions over map/filter where readable
  - Use logging module, never print() for diagnostics
  - Follow import ordering: stdlib → third-party → local (enforced by ruff)
  - Docstrings: Google style or NumPy style, be consistent
