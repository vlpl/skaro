name: django-patterns
description: "Django and DRF architecture patterns"
version: "1.0"
phases:
  - implement
  - plan
roles:
  - coder

instructions: |
  ## Django Patterns
  - App structure: one Django app per domain (models, views, serializers, services, urls)
  - Fat models or service layer — no logic in views
  - DRF serializers for all API input/output validation
  - Use ModelSerializer as default, custom Serializer when schema differs from model
  - ViewSets + routers for standard CRUD, APIView for custom endpoints
  - QuerySet optimization: always use select_related / prefetch_related
  - No raw SQL unless justified with inline comment
  - Migrations via Django migrate only — never manual DDL
  - Use Django signals sparingly — prefer explicit service calls
  - Manager methods for reusable query logic
  - Use django-filter for query parameter filtering

phase_instructions:
  plan: |
    When planning Django features:
    - Define models with field types, relationships, indexes
    - List serializers needed (create/update/list/detail variants)
    - Plan ViewSet actions and custom endpoints
    - Identify which queryset optimizations are needed
