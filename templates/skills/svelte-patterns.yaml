name: svelte-patterns
description: "SvelteKit 2 and Svelte 5 component patterns"
version: "1.0"
phases:
  - implement
  - plan
roles:
  - coder

instructions: |
  ## SvelteKit / Svelte 5 Patterns
  - Use Svelte 5 runes: $state, $derived, $effect instead of legacy stores
  - Data loading: +page.server.ts load functions, not onMount fetch
  - Mutations: SvelteKit form actions with progressive enhancement
  - API routes: +server.ts for REST endpoints
  - SSR by default — disable only with explicit justification
  - Scoped CSS in <style> tags, Tailwind for utility classes
  - Component props: use $props() rune with TypeScript types
  - Snippets for reusable template fragments (Svelte 5)
  - No direct DOM manipulation outside Svelte actions
  - Use $env/static/private for server secrets, $env/static/public for client

phase_instructions:
  plan: |
    When planning SvelteKit features:
    - Define route structure: +page.svelte, +page.server.ts, +layout.svelte
    - Plan load functions and their data dependencies
    - Identify form actions vs API routes
    - List shared components and which use runes vs props
