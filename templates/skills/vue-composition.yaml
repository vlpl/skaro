name: vue-composition
description: "Vue 3 Composition API and component patterns"
version: "1.0"
phases:
  - implement
  - plan
roles:
  - coder

instructions: |
  ## Vue 3 Composition API Rules
  - Always use <script setup> with TypeScript — no Options API
  - Props: defineProps<T>() with TypeScript interface
  - Emits: defineEmits<T>() with typed event signatures
  - Composables: extract reusable logic into use* functions in composables/
  - Pinia stores: one store per domain, use defineStore with setup syntax
  - Reactivity: ref() for primitives, reactive() for objects, computed() for derived
  - Watch: prefer watchEffect for auto-tracking, watch for explicit deps
  - Provide/inject over deep prop drilling (typed with InjectionKey)
  - Async data: composable with loading/error/data pattern
  - One component per .vue file, PascalCase naming

phase_instructions:
  plan: |
    When planning Vue components:
    - Define component tree with data flow direction
    - List composables needed for shared logic
    - Plan Pinia stores and their shape
    - Identify provide/inject boundaries
