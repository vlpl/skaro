name: flutter-architecture
description: "Flutter Clean Architecture and widget patterns"
version: "1.0"
phases:
  - implement
  - plan
roles:
  - coder

instructions: |
  ## Flutter Architecture
  - Clean Architecture layers: data → domain → presentation
  - State management: Riverpod providers or Bloc/Cubit per feature
  - No setState in production widgets — always use state management solution
  - Immutable data classes: use freezed for models and union types
  - Repository pattern: abstract interface in domain, implementation in data
  - Navigation: GoRouter with typed routes and path parameters
  - Networking: Dio with interceptors for auth, logging, retry
  - Use const constructors wherever possible for widget rebuild optimization
  - Composition over inheritance for widget reuse
  - One widget per file, colocate widget + state class
  - Assets: register in pubspec.yaml, use AssetImage/SvgPicture
  - Localization: flutter_localizations + arb files for i18n

phase_instructions:
  plan: |
    When planning Flutter features:
    - Define layer boundaries: which classes go in data/domain/presentation
    - List providers or blocs per feature with their state shape
    - Plan navigation routes and deep link support
    - Identify platform-specific code (MethodChannel, plugins)
