name: fastapi-sqlalchemy
description: "SQLAlchemy 2.0 async patterns for FastAPI"
version: "1.0"
phases:
  - implement
  - plan
roles:
  - coder

instructions: |
  ## SQLAlchemy 2.0 Async Patterns
  - Use async engine and AsyncSession exclusively
  - Declarative models with mapped_column() (SQLAlchemy 2.0 style)
  - Repository pattern: one repository class per aggregate root
  - Session lifecycle: one session per request via Depends()
  - Use select() instead of legacy Query API
  - Eager loading: selectinload() / joinedload() to avoid N+1
  - Alembic for all migrations — never manual DDL
  - Use server_default for DB-level defaults (timestamps, UUIDs)
  - Transactions: rely on session.commit() at service boundary
  - For CPU-bound operations inside async: asyncio.to_thread()
