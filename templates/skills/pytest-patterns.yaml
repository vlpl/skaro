name: pytest-patterns
description: "Pytest testing patterns and best practices"
version: "1.0"
phases:
  - implement
  - tests
  - plan
roles:
  - coder
  - reviewer

instructions: |
  ## Pytest Patterns
  - Use fixtures for setup/teardown, prefer function scope for isolation
  - Parametrize tests with @pytest.mark.parametrize for variant coverage
  - Use conftest.py for shared fixtures, scoped by directory
  - Name tests descriptively: test_<unit>_<scenario>_<expected>
  - Use factory fixtures (factory_boy or custom) for complex test data
  - Assert one logical concept per test
  - Use pytest.raises for exception testing with match= pattern
  - Async tests: use pytest-asyncio with auto mode
  - Avoid test interdependence — each test must pass in isolation
  - Use tmp_path fixture for file system tests

phase_instructions:
  plan: |
    When planning tests:
    - Identify critical paths that need integration tests
    - Plan fixture hierarchy: session → module → function scope
    - List which tests need DB/network vs pure unit tests
