name: angular-architecture
description: "Angular 19 architecture and component patterns"
version: "1.0"
phases:
  - implement
  - plan
roles:
  - coder

instructions: |
  ## Angular 19 Architecture
  - Standalone components only — no NgModules for new code
  - Signals for reactive state, OnPush change detection everywhere
  - Dependency injection: use inject() function or constructor injection
  - Services: @Injectable({providedIn: 'root'}) for singletons
  - Smart/dumb component pattern: containers fetch data, presentational display
  - Lazy-load all feature routes with loadComponent/loadChildren
  - HttpClient + interceptors for API calls — centralized in a service
  - Reactive forms for complex forms, template-driven for simple ones
  - Use Angular Signals (signal, computed, effect) over RxJS for simple state
  - RxJS: use for streams, HTTP, WebSocket — not for simple state management
  - Prefer providedIn over explicit provider arrays

phase_instructions:
  plan: |
    When planning Angular features:
    - Define component tree: smart containers + dumb presentational
    - List services and their injection scope
    - Plan route structure with lazy loading
    - Identify Signal vs RxJS usage per feature
