name: typescript-strict
description: "Strict TypeScript practices for frontend projects"
version: "1.0"
phases:
  - implement
  - plan
  - fix
roles:
  - coder

instructions: |
  ## TypeScript Strict Rules
  - Enable strict mode in tsconfig.json (strict: true)
  - No `any` type — use `unknown` and narrow with type guards
  - Explicit return types on exported functions
  - Prefer interfaces for object shapes, type aliases for unions/intersections
  - Use discriminated unions for state modeling
  - Enums: prefer `as const` objects over TypeScript enums
  - Generics: use constraints (`<T extends Base>`) instead of unconstrained `<T>`
  - Avoid non-null assertion (`!`) — use optional chaining and nullish coalescing
  - Utility types: leverage `Pick`, `Omit`, `Partial`, `Required`, `Record`
