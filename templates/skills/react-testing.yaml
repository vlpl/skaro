name: react-testing
description: "Testing patterns for React applications"
version: "1.0"
phases:
  - implement
  - tests
  - plan
roles:
  - coder
  - reviewer

instructions: |
  ## React Testing Rules
  - Framework: Vitest + React Testing Library
  - Test files: colocated as `ComponentName.test.tsx` or in `__tests__/`
  - Query priority: getByRole > getByLabelText > getByText > getByTestId
  - User interactions: always use @testing-library/user-event, not fireEvent
  - Async: use waitFor() or findBy* for async state updates
  - Avoid testing implementation details (state values, internal methods)
  - Test behavior from the user's perspective
  - Mock external dependencies (API calls, router, context) at module boundary
  - Snapshot tests: use sparingly, only for stable presentational components

phase_instructions:
  plan: |
    When planning tests for React components:
    - Each component with logic needs at least: render test + interaction test
    - Shared components need tests for all variant props
    - Forms: test validation, submission, error states
    - Routes: test navigation and lazy loading

  tests: |
    When reviewing/generating React tests:
    - Verify getByRole is used before getByTestId
    - Verify userEvent is used instead of fireEvent
    - Verify no direct DOM queries (querySelector)
    - Verify async operations use waitFor or findBy*
