name: react-state
description: "State management patterns for React applications"
version: "1.0"
phases:
  - implement
  - plan
roles:
  - coder

instructions: |
  ## React State Management Rules
  - Local UI state: useState (toggles, form inputs, modals)
  - Shared client state: Zustand stores — small, focused, one per domain
  - Server state: React Query (TanStack Query) for all API data
  - Never duplicate server state in client stores
  - Zustand: no actions inside components — define in store slice
  - React Query: invalidate queries after mutations, use optimistic updates where UX benefits
  - URL state: use router params/search params for filterable/shareable state
  - Avoid prop drilling beyond 2 levels — use context or Zustand
  - Context: only for low-frequency updates (theme, locale, auth status)

phase_instructions:
  plan: |
    When planning state management:
    - Classify each piece of state: local UI / shared client / server / URL
    - List Zustand stores needed and their shape
    - List React Query keys and invalidation strategy
    - Identify where optimistic updates are needed
