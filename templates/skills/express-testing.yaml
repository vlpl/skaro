name: express-testing
description: "Express.js testing patterns"
version: "1.0"
phases:
  - implement
  - tests
roles:
  - coder
  - reviewer

instructions: |
  ## Express Testing Patterns
  - Framework: Vitest + supertest
  - Integration tests: supertest against app instance (no server.listen)
  - Unit tests: test services and middleware independently
  - Mock database layer in service tests, use test DB in integration tests
  - Test middleware: pass mock req/res/next objects
  - Test error handling: verify error middleware catches and formats errors
  - Test validation: send invalid payloads, assert 400/422 responses
  - Test auth: verify 401 without token, 403 with wrong role
  - Use test database with transaction rollback for isolation
  - Setup/teardown: beforeAll for app init, afterEach for DB cleanup
