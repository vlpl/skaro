name: nestjs-testing
description: "NestJS testing patterns with TestingModule"
version: "1.0"
phases:
  - implement
  - tests
roles:
  - coder
  - reviewer

instructions: |
  ## NestJS Testing Patterns
  - Use Test.createTestingModule for DI container in tests
  - Unit tests: mock all dependencies with jest.fn() or custom providers
  - Integration tests: use real providers, mock only external services
  - E2E tests: use INestApplication with supertest
  - Override providers: .overrideProvider(Service).useValue(mockService)
  - Test Guards independently: canActivate with mock ExecutionContext
  - Test Interceptors: intercept with mock CallHandler
  - Test Pipes: transform with mock ArgumentMetadata
  - Database tests: use test database, wrap in transactions
  - Always compile module before tests: await module.compile()
