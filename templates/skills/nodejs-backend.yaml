name: nodejs-backend
description: "Node.js backend patterns and conventions"
version: "1.0"
phases:
  - implement
  - plan
  - fix
roles:
  - coder

instructions: |
  ## Node.js Backend Patterns
  - Use async/await exclusively — no callback-style code
  - Typed configuration: validate env vars at startup with Zod or joi
  - Structured logging: pino or winston with JSON output, never console.log
  - Error handling: custom error classes extending Error with status codes
  - Graceful shutdown: handle SIGTERM/SIGINT, drain connections before exit
  - Use connection pooling for database connections
  - Health check endpoint: GET /health returning status and uptime
  - Request ID: generate or propagate X-Request-Id header for tracing
  - No synchronous I/O in request handlers
  - Use ESM imports where supported, CommonJS only if required by tooling
