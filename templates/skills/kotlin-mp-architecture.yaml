name: kotlin-mp-architecture
description: "Kotlin Multiplatform architecture and shared code patterns"
version: "1.0"
phases:
  - implement
  - plan
roles:
  - coder

instructions: |
  ## Kotlin Multiplatform Architecture
  - Maximize shared code in commonMain — target 80%+ sharing
  - Clean Architecture: data/domain/presentation layers in shared module
  - No platform-specific code in domain layer
  - expect/actual: only in data/platform layers, keep surface minimal
  - Prefer interfaces + DI (Koin) over expect/actual where possible
  - Networking: Ktor Client with platform engines (OkHttp/Darwin)
  - Serialization: kotlinx.serialization for all DTOs
  - Database: SQLDelight with commonMain schema, platform drivers
  - Coroutines and Flow for async — no callbacks
  - Compose Multiplatform for UI, native views only when absolutely required
  - Use buildSrc or version catalogs (libs.versions.toml) for dependency management

phase_instructions:
  plan: |
    When planning KMP features:
    - Classify code: commonMain, androidMain, iosMain, desktopMain
    - Plan expect/actual declarations — minimize them
    - Define shared interfaces for platform-specific functionality
    - List Ktor endpoints and serialization models
