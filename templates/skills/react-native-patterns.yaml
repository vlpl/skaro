name: react-native-patterns
description: "React Native component and navigation patterns"
version: "1.0"
phases:
  - implement
  - plan
roles:
  - coder

instructions: |
  ## React Native Patterns
  - Functional components with hooks only — no class components
  - Navigation: React Navigation with typed routes (NativeStackNavigationProp)
  - Styling: StyleSheet.create or NativeWind — no inline style objects
  - Platform-specific: .ios.ts / .android.ts only when truly necessary
  - Animations: Reanimated 3 with worklets — not legacy Animated API
  - Lists: FlashList or FlatList with keyExtractor and getItemLayout
  - Images: use react-native-fast-image for network images with caching
  - Secure storage: react-native-keychain for tokens, never AsyncStorage
  - State: Zustand for client state, TanStack Query for server state
  - Custom hooks for reusable logic in hooks/ directory
  - Error boundaries: wrap navigation stacks for crash resilience

phase_instructions:
  plan: |
    When planning React Native features:
    - Define screen hierarchy and navigation structure (stack, tab, drawer)
    - Mark platform-specific screens or components
    - Plan offline-first data strategy if applicable
    - List native modules or libraries needed per platform
