name: kotlin-mp-testing
description: "Kotlin Multiplatform testing patterns"
version: "1.0"
phases:
  - implement
  - tests
roles:
  - coder
  - reviewer

instructions: |
  ## Kotlin Multiplatform Testing Patterns
  - Framework: kotlin.test in commonTest for maximum sharing
  - Use commonTest for all business logic and domain tests
  - Coroutine tests: runTest from kotlinx-coroutines-test
  - Flow tests: Turbine library for testing Flow emissions
  - Mocking: MockK (JVM/Android), manual fakes for commonMain
  - Ktor tests: MockEngine for HTTP client testing without network
  - SQLDelight: in-memory JdbcSqliteDriver for database tests
  - Platform tests: androidTest/iosTest only for platform-specific code
  - Test expect/actual implementations separately per platform
  - Compose UI tests: createComposeRule on Android, manual on other targets
  - Prefer fakes (manual implementations) over mocks in commonMain
