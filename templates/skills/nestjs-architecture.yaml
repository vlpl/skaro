name: nestjs-architecture
description: "NestJS module architecture and DI patterns"
version: "1.0"
phases:
  - implement
  - plan
roles:
  - coder

instructions: |
  ## NestJS Architecture
  - Module structure: Module → Controller → Service → Repository per domain
  - Use DTOs with class-validator decorators for all input validation
  - Global ValidationPipe for automatic DTO validation
  - Dependency injection: constructor injection, @Injectable() on all services
  - No circular dependencies between modules — use forwardRef only as last resort
  - Guards for auth: @UseGuards(JwtAuthGuard) on controllers/routes
  - Interceptors for cross-cutting: logging, response transform, cache
  - Pipes for data transformation before handler
  - Swagger: @ApiTags, @ApiOperation, @ApiResponse on all endpoints
  - Use ConfigService (@nestjs/config) for typed environment access
  - Custom decorators for common patterns (CurrentUser, Roles)

phase_instructions:
  plan: |
    When planning NestJS features:
    - Define module boundaries and their imports/exports
    - List DTOs per endpoint (Create, Update, Response variants)
    - Plan Guard and Interceptor usage
    - Identify shared modules (database, auth, logging)
