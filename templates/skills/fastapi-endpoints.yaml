name: fastapi-endpoints
description: "FastAPI endpoint and architecture patterns"
version: "1.0"
phases:
  - implement
  - plan
  - tests
roles:
  - coder
  - reviewer

instructions: |
  ## FastAPI Patterns
  - Architecture: Router → Service → Repository (layered)
  - No business logic in routers — delegate to service layer
  - Pydantic v2 models for all request/response schemas
  - Depends() for dependency injection throughout
  - All endpoints are async def
  - HTTPException with detail for error responses
  - status_code in decorator, not in return body
  - Group routers by domain: users, orders, products
  - Use APIRouter prefix and tags for OpenAPI docs
  - Response models: always specify response_model or return type

phase_instructions:
  plan: |
    When planning FastAPI endpoints:
    - List all endpoints with HTTP method, URL, request/response schemas
    - Define service interfaces before implementation
    - Plan dependency injection graph
    - Identify shared middleware (auth, logging, rate limiting)

  tests: |
    FastAPI endpoint tests:
    - httpx.AsyncClient via pytest fixture
    - conftest.py: async engine + override_dependency
    - Each test uses own transaction with rollback
    - Test status_code, response JSON, and headers
    - Test validation errors (422) and auth errors (401/403)
