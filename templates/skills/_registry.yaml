# ─────────────────────────────────────────────────────────────
# Skaro Skills Registry — maps constitution presets to skills
# ─────────────────────────────────────────────────────────────
# When a user selects a constitution preset (e.g. "react"),
# all skills listed here are automatically activated.
#
# To add skills for a new preset, add an entry below.
# Skill files live in this same directory as <name>.yaml.
# ─────────────────────────────────────────────────────────────

presets:

  # ── Frontend ────────────────────────────────────────

  react:
    - typescript-strict
    - react-components
    - react-testing
    - react-state

  vue:
    - typescript-strict
    - vue-composition
    - vue-testing

  sveltekit:
    - typescript-strict
    - svelte-patterns
    - svelte-testing

  nextjs:
    - typescript-strict
    - react-components
    - react-testing
    - nextjs-app-router

  angular:
    - typescript-strict
    - angular-architecture
    - angular-testing

  # ── Backend ─────────────────────────────────────────

  fastapi:
    - python-standards
    - fastapi-endpoints
    - fastapi-sqlalchemy
    - pytest-patterns

  django:
    - python-standards
    - django-patterns
    - django-testing
    - pytest-patterns

  express:
    - typescript-strict
    - nodejs-backend
    - express-patterns
    - express-testing

  nestjs:
    - typescript-strict
    - nodejs-backend
    - nestjs-architecture
    - nestjs-testing

  # ── Mobile ──────────────────────────────────────────

  react-native:
    - typescript-strict
    - react-native-patterns
    - react-native-testing

  flutter:
    - flutter-architecture
    - flutter-testing

  kotlin-mp:
    - kotlin-mp-architecture
    - kotlin-mp-testing
