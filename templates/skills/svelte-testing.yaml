name: svelte-testing
description: "Testing patterns for SvelteKit applications"
version: "1.0"
phases:
  - implement
  - tests
roles:
  - coder
  - reviewer

instructions: |
  ## SvelteKit Testing Patterns
  - Framework: Vitest + @testing-library/svelte
  - Render components with render() from testing-library
  - Query by role, label, text — same priority as React Testing Library
  - User interactions: @testing-library/user-event
  - Test load functions independently as pure async functions
  - Test form actions by calling them with mock RequestEvent
  - Mock fetch and external APIs at module level
  - Use Playwright for E2E covering SSR and navigation
  - Avoid testing Svelte internals ($state values) — test rendered output
