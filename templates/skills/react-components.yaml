name: react-components
description: "Best practices for React component design"
version: "1.0"
phases:
  - implement
  - plan
roles:
  - coder

instructions: |
  ## React Component Rules
  - Functional components only — no class components
  - One component per file, file name matches component name (PascalCase)
  - Named exports for components, not default exports
  - Props: destructure with TypeScript interface, define above component
  - Hooks must be called at top level only — never inside conditions or loops
  - Memoization: use React.memo() only with measurable performance need
  - useCallback/useMemo: only when deps are stable and re-render cost is proven
  - Custom hooks: extract to hooks/ directory when logic is reused across components
  - Lazy loading: React.lazy() for route-level components
  - Prefer composition and children prop over deep prop drilling
  - Event handlers: name as `handleAction` (e.g. handleSubmit, handleClick)

phase_instructions:
  plan: |
    When planning React components:
    - Define component hierarchy (parent → children)
    - Mark shared/reusable components explicitly
    - Specify where state lives vs where it is passed as props
    - Identify which components are route-level (lazy loaded)
