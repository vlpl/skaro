name: flutter-testing
description: "Flutter testing patterns"
version: "1.0"
phases:
  - implement
  - tests
roles:
  - coder
  - reviewer

instructions: |
  ## Flutter Testing Patterns
  - Framework: flutter_test + mockito or mocktail
  - Unit tests: test use cases, repositories, blocs/cubits in isolation
  - Widget tests: pump widgets with required providers (ProviderScope, etc.)
  - Use pumpAndSettle() for animations, pump(duration) for controlled ticking
  - Find widgets: find.byType, find.text, find.byKey — prefer semantic finders
  - Mock repositories and services with @GenerateMocks or mocktail
  - Golden tests: matchesGoldenFile for visual regression (stable widgets only)
  - Integration tests: integration_test package for on-device flows
  - Test Riverpod: use ProviderContainer or overrideWithValue in tests
  - Test Bloc: blocTest() from bloc_test package for state sequence assertions
  - Always test error states and loading states, not just happy path
