name: angular-testing
description: "Angular testing patterns"
version: "1.0"
phases:
  - implement
  - tests
roles:
  - coder
  - reviewer

instructions: |
  ## Angular Testing Patterns
  - Framework: Jest or Vitest + Angular Testing Library
  - Use TestBed.configureTestingModule for component/service setup
  - Prefer Angular Testing Library (render, screen) over ComponentFixture
  - Mock services with jasmine spies or jest.fn()
  - Test services independently with TestBed.inject()
  - HTTP tests: HttpClientTestingModule + HttpTestingController
  - Test OnPush components by triggering change detection explicitly
  - Test Signals: verify computed values update when source signals change
  - Avoid testing private methods — test through public API
  - Use fakeAsync + tick for timer-based tests
