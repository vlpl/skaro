name: nextjs-app-router
description: "Next.js 15 App Router patterns and conventions"
version: "1.0"
phases:
  - implement
  - plan
roles:
  - coder

instructions: |
  ## Next.js App Router Patterns
  - Server Components by default — add 'use client' only for interactivity
  - Data fetching in Server Components via async/await (no useEffect)
  - Mutations via Server Actions (use server) or Route Handlers
  - Layout hierarchy: app/layout.tsx for shared UI, nested layouts per section
  - Loading UI: loading.tsx for Suspense boundaries per route
  - Error handling: error.tsx per route segment
  - Metadata: export metadata or generateMetadata for SEO
  - Images: next/image with width/height or fill, never raw <img>
  - Route Handlers (app/api/): for webhooks and external API endpoints
  - Parallel routes and intercepting routes for complex UI patterns
  - Use unstable_cache or React cache() for expensive server computations

phase_instructions:
  plan: |
    When planning Next.js features:
    - Classify components as Server vs Client — justify each 'use client'
    - Define route segment structure: page, layout, loading, error
    - Plan Server Actions for mutations
    - Identify data fetching patterns: static, dynamic, ISR
