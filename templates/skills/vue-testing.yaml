name: vue-testing
description: "Testing patterns for Vue 3 applications"
version: "1.0"
phases:
  - implement
  - tests
  - plan
roles:
  - coder
  - reviewer

instructions: |
  ## Vue Testing Patterns
  - Framework: Vitest + Vue Test Utils
  - Mount components with mount() for full render, shallowMount() for isolation
  - Test user interactions via trigger() and setValue()
  - Async updates: always await nextTick() or flushPromises() after state changes
  - Mock Pinia stores with createTestingPinia()
  - Mock composables at module level with vi.mock()
  - Test props, emitted events, and rendered output
  - Avoid testing internal component state — test behavior
  - Stub child components when testing parent logic

phase_instructions:
  tests: |
    When reviewing Vue tests:
    - Verify async state updates use await nextTick()
    - Verify Pinia stores are mocked with createTestingPinia
    - Verify emitted events are asserted with wrapper.emitted()
    - Verify no direct access to vm internal state
