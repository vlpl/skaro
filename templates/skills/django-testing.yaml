name: django-testing
description: "Django and DRF testing patterns"
version: "1.0"
phases:
  - implement
  - tests
  - plan
roles:
  - coder
  - reviewer

instructions: |
  ## Django Testing Patterns
  - Framework: pytest-django + factory_boy
  - Use APIClient for endpoint tests, not raw Django test client
  - Factories: one factory per model using factory_boy
  - Fixtures in conftest.py: db access via @pytest.mark.django_db
  - Test serializers independently from views
  - Test model methods and managers as unit tests
  - Integration tests: full request → response cycle through APIClient
  - Use transaction rollback for test isolation (pytest-django default)
  - Test permissions: verify 401/403 for unauthorized access
  - Test pagination, filtering, and ordering on list endpoints
