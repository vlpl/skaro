name: react-native-testing
description: "React Native testing patterns"
version: "1.0"
phases:
  - implement
  - tests
roles:
  - coder
  - reviewer

instructions: |
  ## React Native Testing Patterns
  - Framework: Jest + React Native Testing Library
  - Query priority: getByRole > getByLabelText > getByText > getByTestId
  - User interactions: fireEvent.press, fireEvent.changeText
  - Navigation tests: mock @react-navigation/native with jest.mock
  - Async operations: waitFor() for state updates and API responses
  - Mock native modules in jest.setup.js (react-native-keychain, etc.)
  - Snapshot tests: sparingly, only for stable presentational components
  - Test hooks independently with renderHook from testing-library
  - Mock TanStack Query with QueryClientProvider in test wrapper
  - E2E: Detox or Maestro for critical user flows on both platforms
