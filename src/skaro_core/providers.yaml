# ─────────────────────────────────────────────────────────────
# Skaro — LLM Providers & Models Registry
# ─────────────────────────────────────────────────────────────
# This file is the single source of truth for supported
# providers, their models, console URLs, and env-var names.
#
# To add a new provider or model, simply edit this file.
# No code changes required.
#
# Updated: 2026-03-12
# ─────────────────────────────────────────────────────────────

providers:

