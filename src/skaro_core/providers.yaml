    console_url: "https://console.anthropic.com/settings/keys"
    api_key_env: ANTHROPIC_API_KEY
    needs_key: true
    default_model: claude-sonnet-4-6
    models:
      - id: claude-opus-4-6
        name: "Claude Opus 4.6"
