cli:
  init:
    success: "Skaro initialized in {path}"
    already_exists: "Skaro is already initialized in this project"
    git_detected: "Git repository detected. .skaro/ will be tracked."
    open_ui: "Open dashboard: skaro ui"
  constitution:
    created: "Constitution created: {path}"
    valid: "Constitution is valid"
    invalid: "Constitution validation failed"
    missing_section: "Missing section: {section}"
    section_ok: "Section OK: {section}"
  task:
    created: "Task created: {name}"
    not_found: "Task not found: {name}"
    list_empty: "No tasks yet. Run 'skaro devplan' or 'skaro task new <milestone> <name>'"
    status: "Task '{name}': phase {phase}, stage {stage}"
  milestone:
    created: "Milestone created: {name}"
    not_found: "Milestone not found: {name}"
    list_empty: "No milestones yet. Run 'skaro devplan'"
  clarify:
    start: "Analyzing specification for '{feature}'..."
    question: "Question {n}/{total}"
    saved: "Clarifications saved: {path}"
    spec_updated: "Specification updated with clarifications"
  plan:
    start: "Generating plan for '{feature}'..."
    created: "Plan created: {stages} stages"
    parallel: "Stages {stages} can run in parallel"
    review_prompt: "Open plan in editor?"
  implement:
    start: "Implementing stage {stage} of '{feature}'..."
    files_created: "Files created:"
    tests_result: "Tests: {passed}/{total} passed"
    awaiting_review: "Awaiting your review"
    stage_complete: "Stage {stage} completed, commit created"
  review:
    start: "Running cross-validation for '{feature}'..."
    spec_code_ok: "SPEC ↔ CODE: all requirements implemented"
    spec_code_gap: "SPEC ↔ CODE: {count} gaps found"
    invariants_ok: "INVARIANTS: all respected"
    invariants_broken: "INVARIANTS: {count} violations"
    must_fix: "MUST FIX"
    should_improve: "SHOULD IMPROVE"
    nice_to_have: "NICE TO HAVE"
  ui:
    starting: "Starting Skaro Dashboard on http://localhost:{port}"
    stopped: "Dashboard stopped"
  config:
    saved: "Configuration saved: {path}"
    current: "Current configuration:"
  quickfix:
    start: "Quick fix: {description}"
    complete: "Fix applied and reviewed"
  validate:
    checking: "Validating DoD for {feature}, phase {phase}..."
    passed: "All checks passed"
    failed: "{count} checks failed"
  # Backward-compatible aliases
  feature:
    created: "Task created: {name}"
    not_found: "Task not found: {name}"
    list_empty: "No tasks yet. Run 'skaro devplan' or 'skaro task new <milestone> <name>'"
    status: "Task '{name}': phase {phase}, stage {stage}"

phases:
  constitution: "Constitution"
  architecture: "Architecture"
  clarify: "Clarify"
  plan: "Plan"
  implement: "Implement"
  review: "Review"

status:
  not_started: "not started"
  in_progress: "in progress"
  complete: "complete"
  draft: "draft"
  awaiting_review: "awaiting review"

errors:
  no_skaro: "Skaro not initialized. Run 'skaro init' first."
  no_constitution: "Constitution not found. Run 'skaro constitution init' first."
  no_llm_config: "LLM not configured. Run 'skaro config' first."
  llm_error: "LLM error: {error}"
  file_not_found: "File not found: {path}"
