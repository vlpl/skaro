cli:
  init:
    success: "Skaro инициализирован в {path}"
    already_exists: "Skaro уже инициализирован в этом проекте"
    git_detected: "Обнаружен Git-репозиторий. .skaro/ будет отслеживаться."
    open_ui: "Открыть дашборд: skaro ui"
  constitution:
    created: "Constitution создан: {path}"
    valid: "Constitution валиден"
    invalid: "Валидация Constitution не пройдена"
