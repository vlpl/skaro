    start: "Кросс-валидация задачи '{feature}'..."
    spec_code_ok: "SPEC ↔ КОД: все требования реализованы"
    spec_code_gap: "SPEC ↔ КОД: найдено расхождений: {count}"
    invariants_ok: "ИНВАРИАНТЫ: все соблюдены"
    invariants_broken: "ИНВАРИАНТЫ: нарушений: {count}"
    must_fix: "ОБЯЗАТЕЛЬНО ИСПРАВИТЬ"
    should_improve: "ЖЕЛАТЕЛЬНО УЛУЧШИТЬ"
    nice_to_have: "ПРИ СЛУЧАЕ"
  ui:
    starting: "Запускаю Skaro Dashboard на http://localhost:{port}"
    stopped: "Dashboard остановлен"
  config:
    saved: "Конфигурация сохранена: {path}"
    current: "Текущая конфигурация:"
  quickfix:
    start: "Быстрый фикс: {description}"
    complete: "Фикс применён и проверен"
  validate:
    checking: "Валидирую DoD для {feature}, фаза {phase}..."
    passed: "Все проверки пройдены"
    failed: "Не пройдено проверок: {count}"
  # Обратная совместимость
  feature:
    created: "Задача создана: {name}"
    not_found: "Задача не найдена: {name}"
    list_empty: "Задач пока нет. Запустите 'skaro devplan' или 'skaro task new <milestone> <имя>'"
    status: "Задача '{name}': фаза {phase}, этап {stage}"

phases:
  constitution: "Constitution"
  architecture: "Архитектура"
  clarify: "Уточнение"
  plan: "План"
  implement: "Реализация"
  review: "Ревью"

status:
  not_started: "не начато"
  in_progress: "в работе"
  complete: "завершено"
  draft: "черновик"
  awaiting_review: "ожидает ревью"

errors:
  no_skaro: "Skaro не инициализирован. Выполните 'skaro init'."
  no_constitution: "Constitution не найден. Выполните 'skaro constitution init'."
  no_llm_config: "LLM не настроен. Выполните 'skaro config'."
  llm_error: "Ошибка LLM: {error}"
  file_not_found: "Файл не найден: {path}"
